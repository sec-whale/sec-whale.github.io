<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基数排序动图演示</title>
  <style>
    :root {
      --bg: #f5f7f2;
      --panel: #fffefa;
      --ink: #242520;
      --muted: #676b5f;
      --line: #d5dacd;
      --accent: #276f86;
      --accent-dark: #174f63;
      --scan: #e1a33a;
      --bucket: #4c82d8;
      --collect: #8c5ac5;
      --done: #2e9462;
      --soft: #edf1e8;
      --shadow: 0 18px 46px rgba(48, 60, 38, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(39, 111, 134, 0.10), transparent 36%),
        linear-gradient(315deg, rgba(140, 90, 197, 0.10), transparent 32%),
        var(--bg);
    }

    main {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      min-width: min(440px, 100%);
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 254, 250, 0.9);
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 15px;
    }

    .status strong {
      color: var(--accent-dark);
    }

    .workspace {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 18px;
    }

    .controls,
    .stage {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 254, 250, 0.94);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
    }

    .group {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .group:first-child {
      padding-top: 0;
    }

    .group:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"],
    input[type="text"] {
      width: 100%;
    }

    input[type="text"] {
      height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 52px;
      gap: 10px;
      align-items: center;
    }

    .value-chip {
      min-height: 30px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      background: var(--soft);
      color: #34382f;
      font-weight: 700;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #b7c0ad;
      background: #f8faf5;
    }

    button:disabled {
      cursor: not-allowed;
      color: #a3a89d;
      background: #eef1ea;
    }

    .primary {
      grid-column: span 2;
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .legend {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
    }

    .legend li {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    .stage {
      min-height: 660px;
      padding: 18px;
      overflow: hidden;
    }

    .roundbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .round {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--muted);
      font-weight: 700;
    }

    .round.active {
      border-color: rgba(39, 111, 134, 0.55);
      background: rgba(39, 111, 134, 0.10);
      color: var(--accent-dark);
    }

    .array-area {
      min-height: 170px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 0;
    }

    .number-card {
      width: 66px;
      min-height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      box-shadow: 0 8px 16px rgba(35, 45, 28, 0.08);
      font-size: 21px;
      font-weight: 800;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .number-card.scan {
      border-color: rgba(225, 163, 58, 0.78);
      background: rgba(225, 163, 58, 0.16);
      transform: translateY(-8px);
    }

    .number-card.collect {
      border-color: rgba(140, 90, 197, 0.72);
      background: rgba(140, 90, 197, 0.14);
      transform: translateY(-8px);
    }

    .number-card.done {
      border-color: rgba(46, 148, 98, 0.55);
      background: rgba(46, 148, 98, 0.12);
    }

    .digit {
      position: absolute;
      right: 6px;
      bottom: 4px;
      min-width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      background: var(--scan);
      color: white;
      font-size: 12px;
      font-weight: 800;
    }

    .bucket-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding-top: 18px;
    }

    .bucket {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }

    .bucket.active {
      border-color: rgba(76, 130, 216, 0.7);
      box-shadow: inset 0 0 0 2px rgba(76, 130, 216, 0.12);
    }

    .bucket-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--soft);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .bucket-body {
      min-height: 74px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 6px;
    }

    .pill {
      min-width: 36px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: rgba(76, 130, 216, 0.12);
      border: 1px solid rgba(76, 130, 216, 0.28);
      color: #254b7e;
      font-weight: 800;
      font-size: 13px;
    }

    .pill.collect {
      background: rgba(140, 90, 197, 0.14);
      border-color: rgba(140, 90, 197, 0.34);
      color: #57347e;
    }

    .trace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding-top: 16px;
    }

    .trace-panel {
      min-height: 142px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: white;
    }

    .trace-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .code {
      margin: 0;
      padding: 0;
      list-style: none;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #43483d;
    }

    .code li {
      padding: 0 8px;
      border-radius: 5px;
    }

    .code li.active {
      background: rgba(225, 163, 58, 0.22);
      color: #201f1a;
      font-weight: 800;
    }

    .output-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 42px;
    }

    @media (max-width: 920px) {
      header,
      .workspace {
        display: block;
      }

      .status {
        margin-top: 16px;
      }

      .controls {
        margin-bottom: 18px;
      }

      .bucket-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .trace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 20px, 1220px);
      }

      .roundbar {
        grid-template-columns: 1fr;
      }

      .number-card {
        width: 56px;
        min-height: 52px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>基数排序动图演示</h1>
        <p class="subtitle">按个位、十位、百位分配到桶，再稳定收集回数组。</p>
      </div>
      <div class="status" id="status">点击 <strong>随机生成</strong> 或 <strong>开始排序</strong>。</div>
    </header>

    <section class="workspace">
      <aside class="controls">
        <div class="group">
          <label for="size">序列长度</label>
          <div class="range-row">
            <input id="size" type="range" min="6" max="24" value="12">
            <span class="value-chip" id="sizeValue">12</span>
          </div>
        </div>

        <div class="group">
          <label for="maxValue">随机上限</label>
          <div class="range-row">
            <input id="maxValue" type="range" min="99" max="999" step="100" value="999">
            <span class="value-chip" id="maxValueText">999</span>
          </div>
        </div>

        <div class="group">
          <label for="speed">动画速度</label>
          <div class="range-row">
            <input id="speed" type="range" min="1" max="10" value="6">
            <span class="value-chip" id="speedValue">6</span>
          </div>
        </div>

        <div class="group">
          <label for="manual">自定义序列</label>
          <input id="manual" type="text" value="329 457 657 839 436 720 355 21 98 501 66 12">
        </div>

        <div class="group">
          <div class="button-grid">
            <button id="randomBtn">随机生成</button>
            <button id="applyBtn">使用输入</button>
            <button id="startBtn" class="primary">开始排序</button>
            <button id="pauseBtn">暂停</button>
            <button id="stepBtn">单步</button>
            <button id="resetBtn">重置</button>
          </div>
        </div>

        <div class="group">
          <ul class="legend">
            <li><span class="dot" style="background: var(--scan)"></span> 当前读取的数字</li>
            <li><span class="dot" style="background: var(--bucket)"></span> 当前放入的桶</li>
            <li><span class="dot" style="background: var(--collect)"></span> 正在收集回数组</li>
            <li><span class="dot" style="background: var(--done)"></span> 排序完成</li>
          </ul>
        </div>
      </aside>

      <section class="stage">
        <div class="roundbar">
          <div class="round" data-exp="1">个位</div>
          <div class="round" data-exp="10">十位</div>
          <div class="round" data-exp="100">百位</div>
        </div>

        <div class="array-area" id="arrayArea"></div>
        <div class="bucket-grid" id="bucketGrid"></div>

        <div class="trace">
          <div class="trace-panel">
            <p class="trace-title">本轮收集结果</p>
            <div class="output-row" id="outputRow"></div>
          </div>

          <div class="trace-panel">
            <p class="trace-title">基数排序核心流程</p>
            <ol class="code" id="code">
              <li data-line="round">选择当前位：个位 / 十位 / 百位</li>
              <li data-line="digit">读取数字当前位上的数码</li>
              <li data-line="bucket">按数码放入 0-9 号桶</li>
              <li data-line="collect">从 0 号桶到 9 号桶依次收集</li>
              <li data-line="copy">收集结果成为下一轮数组</li>
            </ol>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      array: [],
      original: [],
      steps: [],
      index: 0,
      playing: false,
      done: false,
      active: {},
      timer: null
    };

    const els = {
      size: document.querySelector("#size"),
      sizeValue: document.querySelector("#sizeValue"),
      maxValue: document.querySelector("#maxValue"),
      maxValueText: document.querySelector("#maxValueText"),
      speed: document.querySelector("#speed"),
      speedValue: document.querySelector("#speedValue"),
      manual: document.querySelector("#manual"),
      randomBtn: document.querySelector("#randomBtn"),
      applyBtn: document.querySelector("#applyBtn"),
      startBtn: document.querySelector("#startBtn"),
      pauseBtn: document.querySelector("#pauseBtn"),
      stepBtn: document.querySelector("#stepBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      status: document.querySelector("#status"),
      arrayArea: document.querySelector("#arrayArea"),
      bucketGrid: document.querySelector("#bucketGrid"),
      outputRow: document.querySelector("#outputRow"),
      code: document.querySelector("#code"),
      rounds: [...document.querySelectorAll(".round")]
    };

    function randomArray(size, maxValue) {
      return Array.from({ length: size }, () => Math.floor(Math.random() * maxValue));
    }

    function parseManual() {
      return els.manual.value
        .split(/[\s,，]+/)
        .map(Number)
        .filter((value) => Number.isInteger(value) && value >= 0)
        .slice(0, 24);
    }

    function digitOf(value, exp) {
      return Math.floor(value / exp) % 10;
    }

    function maxExp(values) {
      const max = Math.max(...values, 0);
      let exp = 1;
      while (Math.floor(max / exp) >= 10) exp *= 10;
      return exp;
    }

    function setArray(next) {
      state.array = next.slice();
      state.original = next.slice();
      state.steps = buildSteps(next);
      state.index = 0;
      state.playing = false;
      state.done = false;
      state.active = {};
      stopTimer();
      render();
      setStatus(`已生成 ${next.length} 个非负整数，点击 <strong>开始排序</strong> 查看基数排序过程。`);
    }

    function buildSteps(source) {
      let arr = source.slice();
      const steps = [];
      const lastExp = maxExp(arr);

      for (let exp = 1; exp <= lastExp; exp *= 10) {
        const buckets = Array.from({ length: 10 }, () => []);
        steps.push({
          type: "round",
          array: arr.slice(),
          exp,
          buckets: cloneBuckets(buckets),
          output: [],
          line: "round"
        });

        for (let i = 0; i < arr.length; i++) {
          const value = arr[i];
          const digit = digitOf(value, exp);
          steps.push({
            type: "scan",
            array: arr.slice(),
            exp,
            scanIndex: i,
            digit,
            buckets: cloneBuckets(buckets),
            output: [],
            line: "digit"
          });
          buckets[digit].push(value);
          steps.push({
            type: "bucket",
            array: arr.slice(),
            exp,
            scanIndex: i,
            digit,
            buckets: cloneBuckets(buckets),
            output: [],
            line: "bucket"
          });
        }

        const output = [];
        for (let bucketIndex = 0; bucketIndex < buckets.length; bucketIndex++) {
          while (buckets[bucketIndex].length) {
            const value = buckets[bucketIndex].shift();
            output.push(value);
            steps.push({
              type: "collect",
              array: arr.slice(),
              exp,
              bucketIndex,
              collectedValue: value,
              buckets: cloneBuckets(buckets),
              output: output.slice(),
              line: "collect"
            });
          }
        }

        arr = output.slice();
        steps.push({
          type: "copy",
          array: arr.slice(),
          exp,
          buckets: cloneBuckets(buckets),
          output: output.slice(),
          line: "copy"
        });
      }

      steps.push({
        type: "done",
        array: arr.slice(),
        exp: lastExp,
        buckets: Array.from({ length: 10 }, () => []),
        output: arr.slice(),
        line: "copy"
      });
      return steps;
    }

    function cloneBuckets(buckets) {
      return buckets.map((bucket) => bucket.slice());
    }

    function render() {
      renderRounds();
      renderArray();
      renderBuckets();
      renderOutput();
      renderCode();
      updateButtons();
    }

    function renderRounds() {
      els.rounds.forEach((round) => {
        const exp = Number(round.dataset.exp);
        round.classList.toggle("active", exp === state.active.exp);
      });
    }

    function renderArray() {
      els.arrayArea.innerHTML = "";
      state.array.forEach((value, index) => {
        const card = document.createElement("div");
        const digit = document.createElement("span");
        const classes = ["number-card"];
        const activeDigit = state.active.exp ? digitOf(value, state.active.exp) : "";

        if (state.done) classes.push("done");
        if (index === state.active.scanIndex) classes.push("scan");
        if (state.active.type === "collect" && value === state.active.collectedValue) classes.push("collect");

        card.className = classes.join(" ");
        card.textContent = value;

        if (state.active.exp && !state.done) {
          digit.className = "digit";
          digit.textContent = activeDigit;
          card.appendChild(digit);
        }

        els.arrayArea.appendChild(card);
      });
    }

    function renderBuckets() {
      els.bucketGrid.innerHTML = "";
      const buckets = state.active.buckets || Array.from({ length: 10 }, () => []);

      for (let i = 0; i < 10; i++) {
        const bucket = document.createElement("div");
        const head = document.createElement("div");
        const body = document.createElement("div");

        bucket.className = "bucket";
        if (i === state.active.digit || i === state.active.bucketIndex) {
          bucket.classList.add("active");
        }

        head.className = "bucket-head";
        head.innerHTML = `<span>${i} 号桶</span><span>${buckets[i].length}</span>`;
        body.className = "bucket-body";

        buckets[i].forEach((value) => {
          const pill = document.createElement("span");
          pill.className = `pill${i === state.active.bucketIndex ? " collect" : ""}`;
          pill.textContent = value;
          body.appendChild(pill);
        });

        bucket.appendChild(head);
        bucket.appendChild(body);
        els.bucketGrid.appendChild(bucket);
      }
    }

    function renderOutput() {
      els.outputRow.innerHTML = "";
      const output = state.active.output || [];
      if (!output.length) {
        const empty = document.createElement("span");
        empty.className = "pill";
        empty.textContent = "等待收集";
        els.outputRow.appendChild(empty);
        return;
      }

      output.forEach((value) => {
        const pill = document.createElement("span");
        pill.className = "pill collect";
        pill.textContent = value;
        els.outputRow.appendChild(pill);
      });
    }

    function renderCode() {
      els.code.querySelectorAll("li").forEach((line) => {
        line.classList.toggle("active", line.dataset.line === state.active.line);
      });
    }

    function setStatus(html) {
      els.status.innerHTML = html;
    }

    function expName(exp) {
      if (exp === 1) return "个位";
      if (exp === 10) return "十位";
      if (exp === 100) return "百位";
      if (exp === 1000) return "千位";
      return `${exp} 位`;
    }

    function describe(step) {
      if (!step) return "";
      if (step.type === "round") return `开始按 <strong>${expName(step.exp)}</strong> 排序，这一轮只看当前位上的数码。`;
      if (step.type === "scan") return `读取 <strong>${step.array[step.scanIndex]}</strong> 的 ${expName(step.exp)}，数码是 <strong>${step.digit}</strong>。`;
      if (step.type === "bucket") return `把 <strong>${step.array[step.scanIndex]}</strong> 放入 <strong>${step.digit} 号桶</strong>。`;
      if (step.type === "collect") return `从 <strong>${step.bucketIndex} 号桶</strong> 收集 <strong>${step.collectedValue}</strong>，保持同桶内原有顺序。`;
      if (step.type === "copy") return `本轮收集完成，结果成为下一轮输入数组。`;
      if (step.type === "done") return `排序完成，序列已经从小到大排列。`;
      return "正在演示基数排序。";
    }

    function stepForward() {
      if (state.index >= state.steps.length) {
        finish();
        return;
      }

      const step = state.steps[state.index++];
      state.array = step.array.slice();
      state.active = step;
      state.done = step.type === "done";
      setStatus(describe(step));
      render();

      if (state.done) finish();
    }

    function play() {
      if (state.done) reset();
      state.playing = true;
      updateButtons();
      stopTimer();
      state.timer = setInterval(() => {
        stepForward();
        if (!state.playing) stopTimer();
      }, delay());
    }

    function pause() {
      state.playing = false;
      stopTimer();
      updateButtons();
    }

    function reset() {
      state.array = state.original.slice();
      state.index = 0;
      state.playing = false;
      state.done = false;
      state.active = {};
      stopTimer();
      render();
      setStatus(`已重置序列，点击 <strong>开始排序</strong> 重新播放。`);
    }

    function finish() {
      state.playing = false;
      state.done = true;
      stopTimer();
      updateButtons();
    }

    function stopTimer() {
      if (state.timer) clearInterval(state.timer);
      state.timer = null;
    }

    function delay() {
      return 980 - Number(els.speed.value) * 82;
    }

    function updateButtons() {
      els.pauseBtn.disabled = !state.playing;
      els.stepBtn.disabled = state.playing || state.done;
      els.startBtn.textContent = state.done ? "重新播放" : "开始排序";
    }

    els.size.addEventListener("input", () => {
      els.sizeValue.textContent = els.size.value;
    });

    els.maxValue.addEventListener("input", () => {
      els.maxValueText.textContent = els.maxValue.value;
    });

    els.speed.addEventListener("input", () => {
      els.speedValue.textContent = els.speed.value;
      if (state.playing) play();
    });

    els.randomBtn.addEventListener("click", () => {
      const next = randomArray(Number(els.size.value), Number(els.maxValue.value));
      els.manual.value = next.join(" ");
      setArray(next);
    });

    els.applyBtn.addEventListener("click", () => {
      const next = parseManual();
      if (next.length < 2) {
        setStatus(`请输入至少 <strong>2</strong> 个非负整数。`);
        return;
      }
      els.size.value = next.length;
      els.sizeValue.textContent = next.length;
      setArray(next);
    });

    els.startBtn.addEventListener("click", play);
    els.pauseBtn.addEventListener("click", pause);
    els.stepBtn.addEventListener("click", stepForward);
    els.resetBtn.addEventListener("click", reset);

    setArray(parseManual());
  </script>
</body>
</html>
