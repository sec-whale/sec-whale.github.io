<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberWhale 工具集</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a2f44 0%, #022b3f 100%);
            min-height: 100vh;
            color: #fff;
        }

        .top-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .toolbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-item {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            color: #4a5568;
            padding: 0.3rem 0.6rem;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(0, 100, 200, 0.08);
            color: #0066cc;
        }

        .nav-item.active {
            color: #0066cc;
            background: rgba(0, 100, 200, 0.1);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 1.5rem 3rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6C7, #C0F0FF, #7FDBFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #b9e2ff;
            font-size: 0.9rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .tool-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
            border-color: #3cc5ff;
        }

        .tool-icon {
            font-size: 1.8rem;
            min-width: 42px;
            text-align: center;
        }

        .tool-info {
            flex: 1;
        }

        .tool-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .tool-desc {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .footer-note {
            text-align: center;
            padding: 2rem;
            font-size: 0.7rem;
            color: #8a9bb0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 5rem 1rem 2rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="top-toolbar">
        <div class="toolbar-container">
            <a href="https://cyberwhale.net" class="logo-area">🐋 CyberWhale · 深海回响</a>
            <div class="nav-links">
                <a href="https://cyberwhale.net" class="nav-item">🏠 首页</a>
                <a href="https://about.cyberwhale.net" class="nav-item">✨ About Me</a>
                <a href="https://cyberwhale.net/ai" class="nav-item">🤖 AI</a>
                <a href="https://cyberwhale.net/download.html" class="nav-item">📦 下载</a>
                <a href="#" class="nav-item active">🛠️ 工具</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>🐋 CyberWhale 工具箱</h1>
            <div class="subtitle">赛博鲸鱼的专属工具集</div>
        </div>

        <div class="tools-grid" id="toolsContainer"></div>
    </div>

    <div class="footer-note">
        © 2026 CyberWhale · 深海漫游者 | 工具持续更新中
    </div>

    <script>
        // 你的 CyberWhale 工具列表
        const tools = [
            { name: "🏠 首页", desc: "cyberwhale.net 主页", url: "https://cyberwhale.net" },
            { name: "✨ About Me", desc: "关于赛博鲸鱼", url: "https://cyberwhale.net/about" },
            { name: "🤖 Cyberwhale AI", desc: "AI 助手入口（未开放）", url: "https://cyberwhale.net/ai" },
            { name: "📦 下载中心", desc: "软件/ISO 下载", url: "https://cyberwhale.net/download" },
            { name: "🛠️ 工具箱", desc: "当前页面", url: "https://cyberwhale.net/tools" },
            { name: "📊 PPT课件", desc: "赛博深潜课件", url: "https://cyberwhale.net/courseware" }
        ];

        const container = document.getElementById('toolsContainer');
        if (container) {
            container.innerHTML = tools.map(tool => `
                <a href="${tool.url}" class="tool-card" target="_blank" rel="noopener noreferrer">
                    <div class="tool-icon">${tool.name.split(' ')[0]}</div>
                    <div class="tool-info">
                        <div class="tool-name">${tool.name}</div>
                        <div class="tool-desc">${tool.desc}</div>
                    </div>
                    <div class="tool-link">→</div>
                </a>
            `).join('');
        }
    </script>
</body>

</html>
