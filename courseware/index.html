        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            color: #eafcff;
            background: #020817;
            overflow-x: hidden
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: radial-gradient(circle at 18% 18%, #064c7a 0, #061d3a 28%, transparent 48%), radial-gradient(circle at 78% 8%, #20d7ff44 0, transparent 28%), linear-gradient(180deg, #06102b 0, #051729 45%, #020713 100%)
        }

        .bg:before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(#7df9ff10 1px, transparent 1px), linear-gradient(90deg, #7df9ff0c 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, #000 0%, transparent 78%)
        }

        .bubbles {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            overflow: hidden
        }

        .bubbles span {
            position: absolute;
            bottom: -80px;
            border-radius: 50%;
            background: #7df9ff55;
            box-shadow: 0 0 18px #7df9ff;
            animation: rise linear infinite
        }

        @keyframes rise {
            to {
                transform: translateY(-115vh) scale(1.8);
                opacity: 0
            }
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 9;
            background: #071d35cc;
            backdrop-filter: blur(18px);
            border-bottom: 1px solid #7df9ff26;
            box-shadow: 0 8px 32px #0006
        }

        .nav-inner {
            width: min(1120px, 94%);
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0
        }

        .logo {
            font-weight: 900;
            letter-spacing: .08em;
            color: #bdfcff;
            text-shadow: 0 0 16px #00eaff
        }

        .navlinks {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        .navlinks a {
            padding: 8px 12px;
            border-radius: 999px;
            color: #d9fbff;
            background: #ffffff08;
            border: 1px solid #ffffff12;
            transition: .25s
        }

        .navlinks a:hover,
        .navlinks a.active {
            color: #07111e;
            background: #9dfaff;
            box-shadow: 0 0 22px #00eaff88;
            transform: translateY(-2px)
        }

        header {
            min-height: 62vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 70px 24px 45px;
            position: relative
        }

        .hero {
            max-width: 960px
        }

        .whale {
            font-size: 78px;
            filter: drop-shadow(0 0 24px #00eaff);
            margin-bottom: 14px;
            animation: swim 5s ease-in-out infinite
        }

        @keyframes swim {
            50% {
                transform: rotate(-4deg) translateX(10px)
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding: 10px 16px;
            border: 1px solid #7df9ff55;
            border-radius: 999px;
            background: #062541aa;
            color: #adf8ff;
            box-shadow: 0 0 22px #00eaff33
        }

        h1 {
            font-size: clamp(38px, 7vw, 86px);
            line-height: 1.04;
            letter-spacing: .04em;
            text-shadow: 0 0 22px #00eaff, 0 0 70px #236dff
        }

        .subtitle {
            margin: 20px auto 0;
            max-width: 760px;
            font-size: clamp(16px, 2.2vw, 22px);
            color: #c4efff;
            line-height: 1.8
        }

        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap
        }

        .btn {
            padding: 13px 24px;
            border-radius: 999px;
            border: 1px solid #77f8ff66;
            background: linear-gradient(135deg, #00eaff33, #376cff55);
            box-shadow: 0 0 28px #00eaff33;
            color: #fff;
            font-weight: 800;
            transition: .25s
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 40px #00eaff88
        }

        .btn.secondary {
            background: #ffffff0d
        }

        section {
            padding: 70px 24px;
            max-width: 1120px;
            margin: auto
        }

        .title {
            text-align: center;
            margin-bottom: 32px
        }

        .title small {
            color: #7df9ff;
            letter-spacing: .2em;
            text-transform: uppercase
        }

        .title h2 {
            font-size: clamp(28px, 5vw, 48px);
            margin-top: 10px;
            text-shadow: 0 0 24px #00eaff66
        }

        .course-shell {
            border: 1px solid #7df9ff2d;
            border-radius: 30px;
            background: linear-gradient(145deg, #071d35dd, #071126dd);
            box-shadow: 0 22px 70px #0009, inset 0 0 40px #ffffff06;
            overflow: hidden
        }

        .course-tabs {
            display: flex;
            gap: 0;
            overflow-x: auto;
            background: #d9f5ff12;
            border-bottom: 1px solid #7df9ff26
        }

        .course-tabs button {
            white-space: nowrap;
            border: 0;
            background: transparent;
            color: #d8f8ff;
            padding: 17px 26px;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: .25s
        }

        .course-tabs button:hover,
        .course-tabs button.active {
            color: #ff4f82;
            border-bottom-color: #ff4f82;
            background: #ffffff0c
        }

        .course-body {
            padding: 16px 28px 30px
        }

        .course-list {
            list-style: none
        }

        .course-list li {
            border-bottom: 1px solid #b9efff18
        }

        .course-main {
            width: 100%;
            border: 0;
            background: transparent;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 15px 10px;
            font-size: clamp(24px, 3.4vw, 38px);
            font-weight: 900;
            color: #dffbff;
            text-shadow: 0 0 18px #00eaff45;
            transition: .2s;
            cursor: pointer;
            font-family: inherit
        }

        .course-main:hover {
            padding-left: 22px;
            color: #9dfaff;
            background: #ffffff08
        }

        .arrow {
            font-size: 26px;
            color: #9befff;
            transition: .25s
        }

        .course-item.open>.course-main .arrow {
            transform: rotate(90deg)
        }

        .sub-list {
            display: none;
            list-style: none;
            margin: 0 0 10px 34px;
            border-left: 2px solid #7df9ff33
        }

        .course-item.open>.sub-list {
            display: block
        }

        .sub-link {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 13px 18px !important;
            font-size: 21px !important;
            font-weight: 800 !important;
            color: #9dfaff !important;
            text-shadow: none !important
        }

        .sub-link:hover {
            background: #00eaff14 !important;
            padding-left: 28px !important
        }

        .sub-list {
            margin: 0 0 12px 34px;
            padding: 6px 0 8px 18px;
            border-left: 2px solid #7df9ff33
        }

        .resource-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 18px 10px;
            border-bottom: 1px solid #b9efff18
        }

        .resource-title {
            font-size: clamp(20px, 2.4vw, 30px);
            font-weight: 800;
            color: #eafcff;
            margin-bottom: 8px
        }

        .resource-desc {
            color: #b9dce8;
            font-size: 17px;
            line-height: 1.6
        }

        .empty-row {
            padding: 26px 10px;
            color: #9ecfe0;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            border-bottom: 1px solid #b9efff18
        }

        .resource-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        .asset-btn {
            min-width: 92px;
            text-align: center;
            padding: 13px 18px;
            border-radius: 8px;
            color: #fff !important;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: .05em;
            box-shadow: 0 0 20px #0003;
            transition: .22s
        }

        .asset-btn:hover {

        }

        }

            background: linear-gradient(135deg, #8e4dff, #7a2cff)
        }

        }

        .asset-practice {

        }

            }

            }

            min-height: 210px;
            padding: 24px;
            border: 1px solid #80f7ff2d;
            border-radius: 28px;
            background: linear-gradient(145deg, #0b2a4bcc, #09152bcc);
            box-shadow: 0 18px 55px #0008, inset 0 0 32px #ffffff06;
            overflow: hidden;
            transition: .3s
        }

        .card:before {
            content: "";
            position: absolute;
            inset: -60px;
            background: radial-gradient(circle, #00eaff22, transparent 55%);
            opacity: 0;
            transition: .3s
        }

            transform: translateY(-8px);
            border-color: #80f7ff88;
            box-shadow: 0 22px 70px #00eaff20
        }

        .card:hover:before {
            opacity: 1
        }

        .card>* {
            position: relative
        }

        .icon {
            font-size: 38px;
            margin-bottom: 15px
        }

        .tag {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #00eaff18;
            color: #aafaff;
            border: 1px solid #00eaff33;
            font-size: 13px
        }

            font-size: 24px;
            margin-bottom: 12px
        }

        .card p {
            color: #c9e9f4;
            line-height: 1.75
        }

        .link {
            display: inline-block;
            margin-top: 18px;
            color: #85f8ff;
            font-weight: 800
        }

            padding: 30px;
            border-radius: 32px;
            border: 1px solid #7df9ff33;
            background: linear-gradient(135deg, #071e3acc, #10274bcc);
            box-shadow: 0 0 50px #00eaff18;
            text-align: center
        }

            margin-bottom: 14px
        }

            color: #d7f7ff;
            line-height: 1.8;

            margin: 0 auto 26px
        }

            padding: 42px 20px;
            color: #fff;

            }

            }

            }

            }

            }
        }
