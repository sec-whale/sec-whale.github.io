<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归并排序动图演示</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #232323;
      --muted: #6d6a63;
      --line: #d8d1c3;
      --panel: #fffdf8;
      --accent: #1f8a70;
      --accent-dark: #116555;
      --left: #3d7fd6;
      --right: #d65a4a;
      --compare: #f2b84b;
      --write: #7a5cc8;
      --done: #2f9d68;
      --shadow: 0 18px 45px rgba(52, 43, 28, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(31, 138, 112, 0.10), transparent 38%),
        linear-gradient(315deg, rgba(214, 90, 74, 0.10), transparent 34%),
        var(--bg);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      min-width: min(420px, 100%);
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.82);
      box-shadow: var(--shadow);
      font-size: 15px;
      color: var(--muted);
    }

    .status strong {
      color: var(--accent-dark);
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .controls,
    .board {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
    }

    .group {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .group:first-child {
      padding-top: 0;
    }

    .group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"],
    input[type="text"] {
      width: 100%;
    }

    input[type="text"] {
      height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      color: var(--ink);
      background: white;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
      align-items: center;
    }

    .value-chip {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 30px;
      border-radius: 6px;
      background: #ece6d8;
      font-weight: 700;
      color: #3d392f;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #b8ad98;
      background: #faf7ef;
    }

    button:disabled {
      cursor: not-allowed;
      color: #aaa49a;
      background: #f2eee6;
    }

    .primary {
      grid-column: span 2;
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .legend {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      color: var(--muted);
    }

    .legend li {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    .board {
      position: relative;
      min-height: 620px;
      padding: 18px;
      overflow: hidden;
    }

    .array-wrap {
      height: 370px;
      padding: 18px 12px 44px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(4px, 1vw, 12px);
    }

    .bar-slot {
      position: relative;
      flex: 1 1 0;
      max-width: 54px;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .bar {
      width: 100%;
      min-width: 18px;
      border-radius: 6px 6px 3px 3px;
      background: linear-gradient(180deg, #56b99f, var(--accent));
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.08);
      transition: height 0.28s ease, background 0.2s ease, transform 0.2s ease;
    }

    .bar.left {
      background: linear-gradient(180deg, #71a9ed, var(--left));
    }

    .bar.right {
      background: linear-gradient(180deg, #ef887d, var(--right));
    }

    .bar.compare {
      background: linear-gradient(180deg, #ffd97a, var(--compare));
      transform: translateY(-10px);
    }

    .bar.write {
      background: linear-gradient(180deg, #aa8cf0, var(--write));
      transform: translateY(-16px);
    }

    .bar.done {
      background: linear-gradient(180deg, #65c991, var(--done));
    }

    .bar-value {
      position: absolute;
      bottom: -28px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }

    .range-marker {
      position: absolute;
      top: 18px;
      height: 336px;
      border: 2px solid rgba(122, 92, 200, 0.48);
      border-radius: 8px;
      pointer-events: none;
      transition: left 0.25s ease, width 0.25s ease, opacity 0.2s ease;
    }

    .trace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding-top: 18px;
    }

    .trace-panel {
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: white;
    }

    .trace-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .merge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 34px;
      margin-bottom: 12px;
    }

    .cell {
      min-width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbf8f1;
      font-weight: 700;
    }

    .cell.left {
      border-color: rgba(61, 127, 214, 0.55);
      background: rgba(61, 127, 214, 0.12);
    }

    .cell.right {
      border-color: rgba(214, 90, 74, 0.55);
      background: rgba(214, 90, 74, 0.12);
    }

    .cell.write {
      border-color: rgba(122, 92, 200, 0.65);
      background: rgba(122, 92, 200, 0.14);
    }

    .code {
      margin: 0;
      padding: 0;
      list-style: none;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #484238;
    }

    .code li {
      padding: 0 8px;
      border-radius: 5px;
    }

    .code li.active {
      background: rgba(242, 184, 75, 0.24);
      color: #1e1b16;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      header,
      .workspace {
        grid-template-columns: 1fr;
      }

      header {
        display: block;
      }

      .status {
        margin-top: 16px;
      }

      .board {
        min-height: auto;
      }

      .array-wrap {
        height: 300px;
        padding-left: 4px;
        padding-right: 4px;
      }

      .trace {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>归并排序动图演示</h1>
        <p class="subtitle">随机序列、手动输入、暂停、单步和速度调节都在这里。</p>
      </div>
      <div class="status" id="status">点击 <strong>随机生成</strong> 或 <strong>开始排序</strong>。</div>
    </header>

    <section class="workspace">
      <aside class="controls">
        <div class="group">
          <label for="size">序列长度</label>
          <div class="range-row">
            <input id="size" type="range" min="6" max="24" value="12">
            <span class="value-chip" id="sizeValue">12</span>
          </div>
        </div>

        <div class="group">
          <label for="speed">动画速度</label>
          <div class="range-row">
            <input id="speed" type="range" min="1" max="10" value="6">
            <span class="value-chip" id="speedValue">6</span>
          </div>
        </div>

        <div class="group">
          <label for="manual">自定义序列</label>
          <input id="manual" type="text" value="38 17 52 9 44 31 26 12 60 5 47 23">
        </div>

        <div class="group">
          <div class="button-grid">
            <button id="randomBtn">随机生成</button>
            <button id="applyBtn">使用输入</button>
            <button id="startBtn" class="primary">开始排序</button>
            <button id="pauseBtn">暂停</button>
            <button id="stepBtn">单步</button>
            <button id="resetBtn">重置</button>
          </div>
        </div>

        <div class="group">
          <ul class="legend">
            <li><span class="dot" style="background: var(--left)"></span> 左半区间</li>
            <li><span class="dot" style="background: var(--right)"></span> 右半区间</li>
            <li><span class="dot" style="background: var(--compare)"></span> 正在比较</li>
            <li><span class="dot" style="background: var(--write)"></span> 写回原数组</li>
            <li><span class="dot" style="background: var(--done)"></span> 排序完成</li>
          </ul>
        </div>
      </aside>

      <section class="board">
        <div class="array-wrap" id="arrayWrap">
          <div class="range-marker" id="rangeMarker"></div>
        </div>

        <div class="trace">
          <div class="trace-panel">
            <p class="trace-title">当前合并区</p>
            <div class="merge-row" id="leftRow"></div>
            <div class="merge-row" id="rightRow"></div>
            <div class="merge-row" id="tempRow"></div>
          </div>

          <div class="trace-panel">
            <p class="trace-title">归并排序核心流程</p>
            <ol class="code" id="code">
              <li data-line="split">分成左右两半</li>
              <li data-line="left">递归排序左半</li>
              <li data-line="right">递归排序右半</li>
              <li data-line="compare">比较左右指针元素</li>
              <li data-line="write">把较小值写回临时数组</li>
              <li data-line="copy">临时数组复制回原数组</li>
            </ol>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      array: [],
      original: [],
      steps: [],
      index: 0,
      playing: false,
      timer: null,
      active: {},
      done: false
    };

    const els = {
      size: document.querySelector("#size"),
      sizeValue: document.querySelector("#sizeValue"),
      speed: document.querySelector("#speed"),
      speedValue: document.querySelector("#speedValue"),
      manual: document.querySelector("#manual"),
      randomBtn: document.querySelector("#randomBtn"),
      applyBtn: document.querySelector("#applyBtn"),
      startBtn: document.querySelector("#startBtn"),
      pauseBtn: document.querySelector("#pauseBtn"),
      stepBtn: document.querySelector("#stepBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      arrayWrap: document.querySelector("#arrayWrap"),
      rangeMarker: document.querySelector("#rangeMarker"),
      status: document.querySelector("#status"),
      leftRow: document.querySelector("#leftRow"),
      rightRow: document.querySelector("#rightRow"),
      tempRow: document.querySelector("#tempRow"),
      code: document.querySelector("#code")
    };

    function randomArray(size) {
      return Array.from({ length: size }, () => Math.floor(Math.random() * 91) + 8);
    }

    function parseManual() {
      return els.manual.value
        .split(/[\s,，]+/)
        .map(Number)
        .filter(Number.isFinite)
        .slice(0, 24);
    }

    function setArray(next) {
      state.array = next.slice();
      state.original = next.slice();
      state.steps = buildSteps(next);
      state.index = 0;
      state.playing = false;
      state.active = {};
      state.done = false;
      stopTimer();
      render();
      setStatus(`已生成 ${next.length} 个元素，点击 <strong>开始排序</strong> 查看归并过程。`);
    }

    function buildSteps(source) {
      const arr = source.slice();
      const steps = [];

      function snapshot(type, detail) {
        steps.push({
          type,
          array: arr.slice(),
          ...detail
        });
      }

      function mergeSort(l, r) {
        if (l >= r) return;
        const mid = Math.floor((l + r) / 2);
        snapshot("split", { l, mid, r, line: "split" });
        mergeSort(l, mid);
        snapshot("leftDone", { l, mid, r, line: "left" });
        mergeSort(mid + 1, r);
        snapshot("rightDone", { l, mid, r, line: "right" });
        merge(l, mid, r);
      }

      function merge(l, mid, r) {
        const left = arr.slice(l, mid + 1);
        const right = arr.slice(mid + 1, r + 1);
        const temp = [];
        let i = 0;
        let j = 0;

        while (i < left.length && j < right.length) {
          snapshot("compare", {
            l,
            mid,
            r,
            i: l + i,
            j: mid + 1 + j,
            left,
            right,
            temp: temp.slice(),
            line: "compare"
          });

          if (left[i] <= right[j]) {
            temp.push(left[i++]);
          } else {
            temp.push(right[j++]);
          }

          snapshot("take", {
            l,
            mid,
            r,
            left,
            right,
            temp: temp.slice(),
            line: "write"
          });
        }

        while (i < left.length) {
          temp.push(left[i++]);
          snapshot("take", { l, mid, r, left, right, temp: temp.slice(), line: "write" });
        }

        while (j < right.length) {
          temp.push(right[j++]);
          snapshot("take", { l, mid, r, left, right, temp: temp.slice(), line: "write" });
        }

        for (let k = 0; k < temp.length; k++) {
          arr[l + k] = temp[k];
          snapshot("copy", {
            l,
            mid,
            r,
            writeIndex: l + k,
            left,
            right,
            temp: temp.slice(),
            line: "copy"
          });
        }
      }

      mergeSort(0, arr.length - 1);
      steps.push({
        type: "done",
        array: arr.slice(),
        l: 0,
        r: arr.length - 1,
        line: "copy"
      });
      return steps;
    }

    function render() {
      const maxValue = Math.max(...state.array, 1);
      const marker = els.rangeMarker;
      els.arrayWrap.querySelectorAll(".bar-slot").forEach((node) => node.remove());

      state.array.forEach((value, index) => {
        const slot = document.createElement("div");
        const bar = document.createElement("div");
        const label = document.createElement("div");
        const classes = ["bar"];
        const active = state.active;

        if (state.done) classes.push("done");
        if (active.l <= index && index <= active.mid) classes.push("left");
        if (active.mid < index && index <= active.r) classes.push("right");
        if (index === active.i || index === active.j) classes.push("compare");
        if (index === active.writeIndex) classes.push("write");

        slot.className = "bar-slot";
        bar.className = classes.join(" ");
        bar.style.height = `${Math.max(10, (value / maxValue) * 100)}%`;
        label.className = "bar-value";
        label.textContent = value;

        slot.appendChild(bar);
        slot.appendChild(label);
        els.arrayWrap.appendChild(slot);
      });

      requestAnimationFrame(() => {
        const slots = [...els.arrayWrap.querySelectorAll(".bar-slot")];
        if (Number.isInteger(state.active.l) && Number.isInteger(state.active.r) && slots[state.active.l] && slots[state.active.r]) {
          const first = slots[state.active.l].getBoundingClientRect();
          const last = slots[state.active.r].getBoundingClientRect();
          const parent = els.arrayWrap.getBoundingClientRect();
          marker.style.left = `${first.left - parent.left}px`;
          marker.style.width = `${last.right - first.left}px`;
          marker.style.opacity = "1";
        } else {
          marker.style.opacity = "0";
        }
      });

      renderRows();
      renderCode();
      updateButtons();
    }

    function renderRows() {
      fillRow(els.leftRow, state.active.left || [], "left", "左");
      fillRow(els.rightRow, state.active.right || [], "right", "右");
      fillRow(els.tempRow, state.active.temp || [], "write", "临时");
    }

    function fillRow(row, values, cls, prefix) {
      row.innerHTML = "";
      if (!values.length) {
        const empty = document.createElement("span");
        empty.className = "cell";
        empty.textContent = prefix;
        row.appendChild(empty);
        return;
      }

      values.forEach((value) => {
        const cell = document.createElement("span");
        cell.className = `cell ${cls}`;
        cell.textContent = value;
        row.appendChild(cell);
      });
    }

    function renderCode() {
      els.code.querySelectorAll("li").forEach((line) => {
        line.classList.toggle("active", line.dataset.line === state.active.line);
      });
    }

    function setStatus(html) {
      els.status.innerHTML = html;
    }

    function describe(step) {
      if (!step) return "";
      const range = Number.isInteger(step.l) && Number.isInteger(step.r) ? `[${step.l + 1}, ${step.r + 1}]` : "";
      if (step.type === "split") return `拆分区间 <strong>${range}</strong>，先排左边再排右边。`;
      if (step.type === "leftDone") return `左半区间已经有序，准备处理右半区间。`;
      if (step.type === "rightDone") return `右半区间也有序，开始合并 <strong>${range}</strong>。`;
      if (step.type === "compare") return `比较 <strong>${step.array[step.i]}</strong> 和 <strong>${step.array[step.j]}</strong>，较小者进入临时数组。`;
      if (step.type === "take") return `较小元素已进入临时数组，继续向后扫描。`;
      if (step.type === "copy") return `把临时数组写回原位置：第 <strong>${step.writeIndex + 1}</strong> 个位置更新为 <strong>${step.array[step.writeIndex]}</strong>。`;
      if (step.type === "done") return `排序完成，整个序列已经从小到大排列。`;
      return "正在演示归并排序。";
    }

    function stepForward() {
      if (state.index >= state.steps.length) {
        finish();
        return;
      }

      const step = state.steps[state.index++];
      state.array = step.array.slice();
      state.active = step;
      state.done = step.type === "done";
      setStatus(describe(step));
      render();

      if (state.done) finish();
    }

    function play() {
      if (state.done) reset();
      state.playing = true;
      updateButtons();
      stopTimer();
      state.timer = setInterval(() => {
        stepForward();
        if (!state.playing) stopTimer();
      }, delay());
    }

    function pause() {
      state.playing = false;
      stopTimer();
      updateButtons();
    }

    function stopTimer() {
      if (state.timer) clearInterval(state.timer);
      state.timer = null;
    }

    function finish() {
      state.playing = false;
      state.done = true;
      stopTimer();
      updateButtons();
    }

    function reset() {
      state.array = state.original.slice();
      state.index = 0;
      state.active = {};
      state.done = false;
      pause();
      render();
      setStatus(`已重置序列，点击 <strong>开始排序</strong> 重新播放。`);
    }

    function delay() {
      return 950 - Number(els.speed.value) * 80;
    }

    function updateButtons() {
      els.pauseBtn.disabled = !state.playing;
      els.stepBtn.disabled = state.playing || state.done;
      els.startBtn.textContent = state.done ? "重新播放" : "开始排序";
    }

    els.size.addEventListener("input", () => {
      els.sizeValue.textContent = els.size.value;
    });

    els.speed.addEventListener("input", () => {
      els.speedValue.textContent = els.speed.value;
      if (state.playing) play();
    });

    els.randomBtn.addEventListener("click", () => {
      const next = randomArray(Number(els.size.value));
      els.manual.value = next.join(" ");
      setArray(next);
    });

    els.applyBtn.addEventListener("click", () => {
      const next = parseManual();
      if (next.length < 2) {
        setStatus(`请输入至少 <strong>2</strong> 个数字。`);
        return;
      }
      els.size.value = next.length;
      els.sizeValue.textContent = next.length;
      setArray(next);
    });

    els.startBtn.addEventListener("click", play);
    els.pauseBtn.addEventListener("click", pause);
    els.stepBtn.addEventListener("click", stepForward);
    els.resetBtn.addEventListener("click", reset);

    setArray(parseManual());
  </script>
</body>
</html>
