        const userArea = document.getElementById('userArea');

        function renderUserArea() {
            if (!currentUser) return;
            const isAdmin = currentUser.role === 'admin';
            userArea.innerHTML = `
                <span class="user-info">👤 ${currentUser.username}${isAdmin ? '(管理员)' : ''}</span>
                ${!isAdmin ? '<button class="user-btn" id="changePwdBtn">🔑 修改密码</button>' : ''}
                ${isAdmin ? '<button class="admin-btn" id="manageAppsBtn">📦 应用管理</button>' : ''}
                ${isAdmin ? '<button class="admin-btn" id="manageUsersBtn">👥 用户管理</button>' : ''}
                <button class="logout-btn" id="logoutBtn">🚪 退出</button>
            `;
            if (!isAdmin) {
                document.getElementById('changePwdBtn')?.addEventListener('click', () => showChangePwdModal(currentUser.username));
            }
            if (isAdmin) {
                document.getElementById('manageAppsBtn')?.addEventListener('click', showAppManagementModal);
                document.getElementById('manageUsersBtn')?.addEventListener('click', showUserManagementModal);
            }
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        }

        function showChangePwdModal(username) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <h3>🔑 修改密码</h3>
                    <p style="color:#6c86a3; margin-bottom:1rem;">用户：${username}</p>
                    <input type="password" id="newPwd" placeholder="新密码">
                    <input type="password" id="confirmPwd" placeholder="确认新密码">
                    <div class="modal-buttons">
                        <button class="modal-cancel" id="modalCancel">取消</button>
                        <button class="modal-confirm" id="modalConfirm">确认修改</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#modalConfirm').onclick = () => {
                const newPwd = modal.querySelector('#newPwd').value;
                const confirmPwd = modal.querySelector('#confirmPwd').value;
                if (!newPwd) { alert('请输入新密码'); return; }
                if (newPwd !== confirmPwd) { alert('两次输入的密码不一致'); return; }
                if (changePassword(username, newPwd)) {
                    alert('密码修改成功！请重新登录');
                    modal.remove();
                    logout();
                } else { alert('修改失败'); }
            };
            modal.querySelector('#modalCancel').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function logout() {
            currentUser = null;
            sessionStorage.removeItem('cyberwhale_current_user');
            loginOverlay.style.display = 'flex';
            mainContent.style.display = 'none';
            if (usernameInput) usernameInput.value = '';
            if (passwordInput) passwordInput.value = '';
            if (errorMsg) errorMsg.style.display = 'none';
        }

        function showUserManagementModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <h3>👥 用户管理</h3>
                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
                        <input type="text" id="newUsername" placeholder="新用户名" style="flex:2;">
                        <input type="password" id="newPassword" placeholder="密码" style="flex:2;">
                        <select id="newRole" style="flex:1;">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                        <button class="admin-btn" id="addUserBtn" style="background:#28a745;">➕ 添加</button>
                    </div>
                    <div class="user-list" id="userList"></div>
                    <div class="modal-buttons">
                        <button class="modal-cancel" id="modalClose">关闭</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            function renderUserList() {
                const users = getUsers();
                const userListDiv = modal.querySelector('#userList');
                userListDiv.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div>
                            <span class="app-name">${u.username}</span>
                            <span class="app-category">${u.role === 'admin' ? '管理员' : '普通用户'}</span>
                        </div>
                        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                            <button class="edit-pwd-btn" data-username="${u.username}">改密码</button>
                            ${u.username !== 'admin' ? `<button class="edit-role-btn" data-username="${u.username}" data-role="${u.role}">改角色</button>` : ''}
                            ${u.username !== 'admin' ? `<button class="delete-user-btn" data-username="${u.username}">删除</button>` : ''}
                        </div>
                    </div>
                `).join('');

                modal.querySelectorAll('.edit-pwd-btn').forEach(btn => {
                    btn.onclick = () => {
                        const username = btn.getAttribute('data-username');
                        showAdminChangePwdModal(username, modal);
                    };
                });
                modal.querySelectorAll('.edit-role-btn').forEach(btn => {
                    btn.onclick = () => {
                        const username = btn.getAttribute('data-username');
                        const currentRole = btn.getAttribute('data-role');
                        const newRole = currentRole === 'admin' ? 'user' : 'admin';
                        if (confirm(`确定将用户 "${username}" 的角色改为「${newRole === 'admin' ? '管理员' : '普通用户'}」吗？`)) {
                            if (changeRole(username, newRole)) {
                                alert(`用户 ${username} 角色已更新`);
                                renderUserList();
                                if (currentUser && currentUser.username === username) {
                                    currentUser.role = newRole;
                                    sessionStorage.setItem('cyberwhale_current_user', JSON.stringify(currentUser));
                                    renderUserArea();
                                }
                            } else { alert('修改失败'); }
                        }
                    };
                });
                modal.querySelectorAll('.delete-user-btn').forEach(btn => {
                    btn.onclick = () => {
                        if (confirm('确定删除此用户吗？')) {
                            const username = btn.getAttribute('data-username');
                            deleteUser(username);
                            renderUserList();
                            if (currentUser && currentUser.username === username) logout();
                        }
                    };
                });
            }

            modal.querySelector('#addUserBtn').onclick = () => {
                const newUsername = modal.querySelector('#newUsername').value.trim();
                const newPassword = modal.querySelector('#newPassword').value.trim();
                const newRole = modal.querySelector('#newRole').value;
                if (!newUsername || !newPassword) { alert('请填写用户名和密码'); return; }
                if (addUser(newUsername, newPassword, newRole)) {
                    alert(`用户 ${newUsername} 添加成功！`);
                    modal.querySelector('#newUsername').value = '';
                    modal.querySelector('#newPassword').value = '';
                    renderUserList();
                } else { alert('用户名已存在'); }
            };
            renderUserList();
            modal.querySelector('#modalClose').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function showAdminChangePwdModal(username, parentModal) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <h3>🔑 修改密码</h3>
                    <p style="color:#6c86a3; margin-bottom:1rem;">用户：${username}</p>
                    <input type="password" id="newPwd" placeholder="新密码">
                    <input type="password" id="confirmPwd" placeholder="确认新密码">
                    <div class="modal-buttons">
                        <button class="modal-cancel" id="modalCancel">取消</button>
                        <button class="modal-confirm" id="modalConfirm">确认修改</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#modalConfirm').onclick = () => {
                const newPwd = modal.querySelector('#newPwd').value;
                const confirmPwd = modal.querySelector('#confirmPwd').value;
                if (!newPwd) { alert('请输入新密码'); return; }
                if (newPwd !== confirmPwd) { alert('两次输入的密码不一致'); return; }
                if (changePassword(username, newPwd)) {
                    alert(`用户 ${username} 密码修改成功！`);
                    modal.remove();
                    if (parentModal) {
                        const users = getUsers();
                        const userListDiv = parentModal.querySelector('#userList');
                        if (userListDiv) {
                            userListDiv.innerHTML = users.map(u => `
                                <div class="user-item">
                                    <div><span class="app-name">${u.username}</span><span class="app-category">${u.role === 'admin' ? '管理员' : '普通用户'}</span></div>
                                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                                        <button class="edit-pwd-btn" data-username="${u.username}">改密码</button>
                                        ${u.username !== 'admin' ? `<button class="edit-role-btn" data-username="${u.username}" data-role="${u.role}">改角色</button>` : ''}
                                        ${u.username !== 'admin' ? `<button class="delete-user-btn" data-username="${u.username}">删除</button>` : ''}
                                    </div>
                                </div>
                            `).join('');
                            parentModal.querySelectorAll('.edit-pwd-btn').forEach(btn => {
                                btn.onclick = () => showAdminChangePwdModal(btn.getAttribute('data-username'), parentModal);
                            });
                            parentModal.querySelectorAll('.edit-role-btn').forEach(btn => {
                                btn.onclick = () => {
                                    const uname = btn.getAttribute('data-username');
                                    const cr = btn.getAttribute('data-role');
                                    const nr = cr === 'admin' ? 'user' : 'admin';
                                    if (confirm(`确定将用户 "${uname}" 的角色改为「${nr === 'admin' ? '管理员' : '普通用户'}」吗？`)) {
                                        if (changeRole(uname, nr)) {
                                            alert(`用户 ${uname} 角色已更新`);
                                            location.reload();
                                        }
                                    }
                                };
                            });
                            parentModal.querySelectorAll('.delete-user-btn').forEach(btn => {
                                btn.onclick = () => {
                                    if (confirm('确定删除此用户吗？')) {
                                        const uname = btn.getAttribute('data-username');
                                        deleteUser(uname);
                                        if (currentUser && currentUser.username === uname) logout();
                                        location.reload();
                                    }
                                };
                            });
                        }
                    }
                } else { alert('修改失败'); }
            };
            modal.querySelector('#modalCancel').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        // ==================== 应用管理 ====================
        function showAppManagementModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal"><h3>📦 应用管理</h3><div style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                <button class="admin-btn" id="addAppBtn" style="background:#28a745;">➕ 添加应用</button>
                <button class="admin-btn" id="manageCategoriesBtn" style="background:#6c86a3;">📁 管理分类</button>
            </div><div class="app-list" id="appList"></div><div class="modal-buttons"><button class="modal-cancel" id="modalClose">关闭</button></div></div>`;
            document.body.appendChild(modal);

            function renderAppList() {
                const apps = [...appData.apps];
                modal.querySelector('#appList').innerHTML = apps.map(app => `<div class="app-item"><div><span class="app-name">${app.icon || '📎'} ${app.name}</span><span class="app-category">${app.type === 'app' ? '应用' : 'ISO'}</span></div><div class="app-actions"><button class="edit-app-btn" data-id="${app.id}">编辑</button><button class="delete-app-btn" data-id="${app.id}">删除</button></div></div>`).join('');
                modal.querySelectorAll('.edit-app-btn').forEach(btn => { btn.onclick = () => showEditAppModal(btn.getAttribute('data-id'), modal); });
                modal.querySelectorAll('.delete-app-btn').forEach(btn => { btn.onclick = () => { if (confirm('确定删除此应用吗？')) { appData.apps = appData.apps.filter(a => a.id !== btn.getAttribute('data-id')); saveAppData(); renderAppList(); renderMainPage(); } }; });
            }
            document.getElementById('addAppBtn').onclick = () => showAddAppModal(modal);
            document.getElementById('manageCategoriesBtn').onclick = () => showManageCategoriesModal(modal);
            renderAppList();
            modal.querySelector('#modalClose').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function showManageCategoriesModal(parentModal) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal"><h3>📁 管理分类</h3><div class="user-list" id="categoryList"></div><div class="modal-buttons"><button class="modal-cancel" id="modalClose">关闭</button></div></div>`;
            document.body.appendChild(modal);
            function renderCategoryList() {
                modal.querySelector('#categoryList').innerHTML = appData.categories.map(cat => `<div class="user-item"><span class="app-name">${cat}</span></div>`).join('');
            }
            renderCategoryList();
            modal.querySelector('#modalClose').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function showAddAppModal(parentModal) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <h3>➕ 添加应用/ISO</h3>
                    <select id="appType">
                        <option value="app">应用</option>
                        <option value="iso">ISO镜像</option>
                    </select>
                    <input id="appName" placeholder="名称">
                    <input id="appIcon" placeholder="图标 (如 💻 🐍)">
                    <input id="appVersion" placeholder="版本号">
                    <input id="appDate" placeholder="更新日期">
                    <input id="appSource" placeholder="来源名称">
                    <input id="appSourceUrl" placeholder="来源网址">
                    <div id="appLinksArea">
                        <h4>下载链接 (留空表示不支持)</h4>
                        <input id="appWin" placeholder="Windows 下载链接">
                        <input id="appMacIntel" placeholder="macOS Intel 下载链接">
                        <input id="appMacApple" placeholder="macOS Apple 下载链接">
                        <input id="appLinux" placeholder="Linux 下载链接">
                    </div>
                    <div id="isoLinksArea" style="display:none;">
                        <h4>ISO 下载链接</h4>
                        <input id="appIso" placeholder="ISO 下载链接">
                    </div>
                    <div class="modal-buttons">
                        <button class="modal-cancel" id="modalCancel">取消</button>
                        <button class="modal-confirm" id="modalConfirm">添加</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const typeSelect = modal.querySelector('#appType');
            const appLinksArea = modal.querySelector('#appLinksArea');
            const isoLinksArea = modal.querySelector('#isoLinksArea');

            typeSelect.onchange = () => {
                if (typeSelect.value === 'app') {
                    appLinksArea.style.display = 'block';
                    isoLinksArea.style.display = 'none';
                } else {
                    appLinksArea.style.display = 'none';
                    isoLinksArea.style.display = 'block';
                }
            };

            modal.querySelector('#modalConfirm').onclick = () => {
                const type = typeSelect.value;
                const newApp = {
                    id: getNextId(),
                    name: modal.querySelector('#appName').value.trim(),
                    type: type,
                    category: type === 'app' ? '应用' : 'ISO',
                    icon: modal.querySelector('#appIcon').value.trim() || (type === 'app' ? '📎' : '💿'),
                    version: modal.querySelector('#appVersion').value.trim() || '1.0',
                    date: modal.querySelector('#appDate').value.trim() || '2026-01',
                    source: modal.querySelector('#appSource').value.trim() || '未知',
                    sourceUrl: modal.querySelector('#appSourceUrl').value.trim() || '#',
                    win: '',
                    macIntel: '',
                    macApple: '',
                    linux: '',
                    iso: ''
                };
                if (type === 'app') {
                    newApp.win = modal.querySelector('#appWin').value.trim();
                    newApp.macIntel = modal.querySelector('#appMacIntel').value.trim();
                    newApp.macApple = modal.querySelector('#appMacApple').value.trim();
                    newApp.linux = modal.querySelector('#appLinux').value.trim();
                } else {
                    newApp.iso = modal.querySelector('#appIso').value.trim();
                }
                if (!newApp.name) { alert('请填写名称'); return; }
                appData.apps.push(newApp);
                saveAppData();
                renderMainPage();
                modal.remove();
                if (parentModal) { parentModal.querySelector('#appList').innerHTML = ''; showAppManagementModal(); parentModal.remove(); }
                else { showAppManagementModal(); }
            };
            modal.querySelector('#modalCancel').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function showEditAppModal(appId, parentModal) {
            const app = appData.apps.find(a => a.id === appId);
            if (!app) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <h3>✏️ 编辑</h3>
                    <select id="appType">
                        <option value="app" ${app.type === 'app' ? 'selected' : ''}>应用</option>
                        <option value="iso" ${app.type === 'iso' ? 'selected' : ''}>ISO镜像</option>
                    </select>
                    <input id="appName" value="${app.name.replace(/"/g, '&quot;')}" placeholder="名称">
                    <input id="appIcon" value="${app.icon || (app.type === 'app' ? '📎' : '💿')}" placeholder="图标">
                    <input id="appVersion" value="${app.version}" placeholder="版本号">
                    <input id="appDate" value="${app.date}" placeholder="更新日期">
                    <input id="appSource" value="${app.source.replace(/"/g, '&quot;')}" placeholder="来源名称">
                    <input id="appSourceUrl" value="${app.sourceUrl}" placeholder="来源网址">
                    <div id="appLinksArea" style="${app.type === 'app' ? 'display:block' : 'display:none'}">
                        <h4>下载链接</h4>
                        <input id="appWin" value="${app.win || ''}" placeholder="Windows">
                        <input id="appMacIntel" value="${app.macIntel || ''}" placeholder="macOS Intel">
                        <input id="appMacApple" value="${app.macApple || ''}" placeholder="macOS Apple">
                        <input id="appLinux" value="${app.linux || ''}" placeholder="Linux">
                    </div>
                    <div id="isoLinksArea" style="${app.type === 'iso' ? 'display:block' : 'display:none'}">
                        <h4>ISO 下载链接</h4>
                        <input id="appIso" value="${app.iso || ''}" placeholder="ISO 下载链接">
                    </div>
                    <div class="modal-buttons">
                        <button class="modal-cancel" id="modalCancel">取消</button>
                        <button class="modal-confirm" id="modalConfirm">保存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const typeSelect = modal.querySelector('#appType');
            const appLinksArea = modal.querySelector('#appLinksArea');
            const isoLinksArea = modal.querySelector('#isoLinksArea');

            typeSelect.onchange = () => {
                if (typeSelect.value === 'app') {
                    appLinksArea.style.display = 'block';
                    isoLinksArea.style.display = 'none';
                } else {
                    appLinksArea.style.display = 'none';
                    isoLinksArea.style.display = 'block';
                }
            };

            modal.querySelector('#modalConfirm').onclick = () => {
                app.name = modal.querySelector('#appName').value.trim() || app.name;
                app.type = typeSelect.value;
                app.category = app.type === 'app' ? '应用' : 'ISO';
                app.icon = modal.querySelector('#appIcon').value.trim() || (app.type === 'app' ? '📎' : '💿');
                app.version = modal.querySelector('#appVersion').value.trim() || '1.0';
                app.date = modal.querySelector('#appDate').value.trim() || '2026-01';
                app.source = modal.querySelector('#appSource').value.trim() || '未知';
                app.sourceUrl = modal.querySelector('#appSourceUrl').value.trim() || '#';
                if (app.type === 'app') {
                    app.win = modal.querySelector('#appWin').value.trim();
                    app.macIntel = modal.querySelector('#appMacIntel').value.trim();
                    app.macApple = modal.querySelector('#appMacApple').value.trim();
                    app.linux = modal.querySelector('#appLinux').value.trim();
                    app.iso = '';
                } else {
                    app.iso = modal.querySelector('#appIso').value.trim();
                    app.win = app.macIntel = app.macApple = app.linux = '';
                }
                saveAppData();
                renderMainPage();
                modal.remove();
                if (parentModal) { parentModal.querySelector('#appList').innerHTML = ''; showAppManagementModal(); parentModal.remove(); }
                else { showAppManagementModal(); }
            };
            modal.querySelector('#modalCancel').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        // ==================== 初始化 ====================
        loadAppData();
        initUsers();
        renderMainPage();

        const savedUser = sessionStorage.getItem('cyberwhale_current_user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (validateUser(user.username, user.password)) {
                    currentUser = user;
                    loginOverlay.style.display = 'none';
                    mainContent.style.display = 'block';
                    renderUserArea();
                } else { loginOverlay.style.display = 'flex'; }
            } catch (e) { loginOverlay.style.display = 'flex'; }
        } else { loginOverlay.style.display = 'flex'; }

        function doLogin() {
            const user = validateUser(usernameInput.value.trim(), passwordInput.value);
            if (user) {
                currentUser = user;
                sessionStorage.setItem('cyberwhale_current_user', JSON.stringify(user));
                loginOverlay.style.display = 'none';
                mainContent.style.display = 'block';
                renderUserArea();
                errorMsg.style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
                usernameInput.value = ''; passwordInput.value = ''; usernameInput.focus();
            }
        }
        if (loginBtn) loginBtn.addEventListener('click', doLogin);
        if (usernameInput) usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
        if (passwordInput) passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>

</html>
